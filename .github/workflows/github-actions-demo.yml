name: GitHub Actions Demo
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
  pull_request:
    branches:
      - main
  schedule:
    - cron: '15 6 * * 0'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - run: |
        echo "Event name: ${{ github.event_name }}, ref: ${{ github.ref }}"
    - uses: actions/checkout@v3.3.0
    - name: List files
      run: tree
