name: GitHub Actions Demo
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Env to deploy to'
        type: environment
        required: true
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
  pull_request:
    branches:
      - main
  schedule:
    - cron: '15 6 * * 0'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - run: |
        echo "Event name: ${{ github.event_name }}, ref: ${{ github.ref }}"
    - uses: actions/checkout@v3.3.0
    - name: List files
      run: tree
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: Test
    steps:
      - run: |
          echo "Testing..."
  load-test:
    name: Load-Test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: Load-Test
    steps:
      - run: |
          echo "Testing..."
          sleep 15
  production:
    name: Production
    runs-on: ubuntu-latest
    needs: [test, load-test]
    if: ${{ inputs.environment == 'Production' }}
    environment:
      name: Production
      url: https://writeabout.net
    steps:
      - run: |
          echo "Step 1 deploying..."
          sleep 10
      - run: |
          echo "Step 2 deploying..."
          sleep 10
      - run: |
          echo "Step 3 deploying..."
          sleep 10
      - run: |
          echo "Step 4 deploying..."
          sleep 10
      - run: |
          echo "Step 5 deploying..."
          sleep 10
